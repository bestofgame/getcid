<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Activation Expert - Cloud Engine</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { --primary: #0078d4; --bg: #f3f2f1; --dark-card: #1a1c1e; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card-expert { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; max-width: 650px; margin: auto; }
        .drop-zone { border: 2px dashed var(--primary); border-radius: 12px; padding: 40px; cursor: pointer; background: #f0f7ff; text-align: center; display: block; }
        .iid-input { font-size: 1.2rem; letter-spacing: 2px; font-weight: 700; text-align: center; border: 2px solid #0078d4; }
        .cid-box { background: var(--dark-card); color: #39FF14; font-family: 'Courier New', monospace; font-size: 1.4rem; text-align: center; border-radius: 8px; }
        .grid-cid input { text-align: center; font-weight: bold; background: #f8f9fa; }
        .loader { width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #0078d4; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="card-expert">
        <h3 class="text-center fw-bold text-primary mb-4">Support Activation Cloud</h3>
        
        <div class="mb-4">
            <label for="img-up" class="drop-zone">
                <span class="fs-5 d-block mb-2">📸 Charger l'image de l'étape 2</span>
                <input type="file" id="img-up" accept="image/*" style="display:none">
            </label>
            <div id="ocr-status" class="mt-3 text-center small text-secondary">En attente d'image...</div>
        </div>

        <hr class="my-4">

        <div class="mb-3">
            <label class="fw-bold small mb-1 text-uppercase text-muted">Installation ID (IID) :</label>
            <div class="input-group mb-2">
                <input type="text" id="tbxIID" class="form-control iid-input" placeholder="000000-000000...">
                <button type="button" id="btnGetCID" class="btn btn-primary px-4 fw-bold">OBTENIR CID</button>
            </div>
        </div>

        <div class="mt-5">
            <label class="fw-bold small mb-1 text-uppercase text-muted">Confirmation ID (CID) :</label>
            <input type="text" id="tbxCid" class="form-control cid-box mb-3" placeholder="RÉSULTAT ICI" readonly>
            
            <div class="row g-2">
                <div class="col-3"><input type="text" id="cidA" class="form-control" placeholder="A" readonly></div>
                <div class="col-3"><input type="text" id="cidB" class="form-control" placeholder="B" readonly></div>
                <div class="col-3"><input type="text" id="cidC" class="form-control" placeholder="C" readonly></div>
                <div class="col-3"><input type="text" id="cidD" class="form-control" placeholder="D" readonly></div>
                <div class="col-3"><input type="text" id="cidE" class="form-control" placeholder="E" readonly></div>
                <div class="col-3"><input type="text" id="cidF" class="form-control" placeholder="F" readonly></div>
                <div class="col-3"><input type="text" id="cidG" class="form-control" placeholder="G" readonly></div>
                <div class="col-3"><input type="text" id="cidH" class="form-control" placeholder="H" readonly></div>
            </div>
        </div>
    </div>
    <p class="text-center mt-4 text-muted small">© 2026 Ebooxly Tech - Propulsé par Cloudflare Workers</p>
</div>

<script>
$(document).ready(function() {
    const iidInput = $("#tbxIID");
    const status = $("#ocr-status");

    // 1. FORMATAGE DYNAMIQUE IID
    iidInput.on("input", function() {
        let t = this.value.replace(/\D/g, "");
        if(t.length == 63 || t.length == 54) {
            this.value = t.match(new RegExp(".{1," + t.length/9 + "}", "g")).join("-");
        } else { this.value = t; }
    });

    // 2. APPEL DIRECT AU WORKER CLOUDFLARE AVEC GESTION D'ERREUR INTELLIGENTE
    $("#btnGetCID").on("click", async function() {
        const rawIID = iidInput.val().replace(/\D/g, "");
        if (rawIID.length < 54) {
            alert("IID invalide ou trop court.");
            return;
        }

        status.attr("class", "mt-3 text-center small text-primary").html("<div class='loader'></div> Connexion au serveur Cloudflare...");

        try {
            const response = await fetch("https://ms-activation-api.hilalyweb.workers.dev/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ iid: rawIID })
            });

            const xmlText = await response.text();
            const match = xmlText.match(/&lt;CID&gt;(\d+)&lt;\/CID&gt;/);

            if (match) {
                const cid = match[1];
                $("#tbxCid").val(cid);
                for(let i=0; i<8; i++) {
                    let chunk = cid.substring(i*6, (i+1)*6);
                    $(`#cid${String.fromCharCode(65+i)}`).val(chunk);
                }
                status.attr("class", "mt-3 text-center small text-success fw-bold").text("✅ CID reçu !");
            } else {
                // --- NOUVEAU : Analyse du XML renvoyé par le Worker ---
                const errCodeMatch = xmlText.match(/&lt;ErrorCode&gt;(0x[0-9A-Fa-f]+)&lt;\/ErrorCode&gt;/i) || xmlText.match(/<faultcode>(.*?)<\/faultcode>/i);
                const errDescMatch = xmlText.match(/&lt;Description&gt;(.*?)&lt;\/Description&gt;/i) || xmlText.match(/<faultstring>(.*?)<\/faultstring>/i);

                let errorMsg = "❌ Microsoft a refusé l'IID.";
                
                if (errCodeMatch) {
                    let code = errCodeMatch[1].replace(/(<([^>]+)>)/gi, "").toUpperCase();
                    if (code === '0XC004C008' || code === '0XC004C020') {
                        errorMsg = `❌ <b>Refusé (Code : ${code})</b><br>La clé est bloquée ou a atteint sa limite d'activation.`;
                    } else {
                        let desc = errDescMatch ? errDescMatch[1].replace(/(<([^>]+)>)/gi, "") : "Pas de détail.";
                        errorMsg = `❌ <b>Refusé (Code : ${code})</b><br>${desc}`;
                    }
                }
                status.attr("class", "mt-3 text-center small text-danger").html(errorMsg);
            }
        } catch (err) {
            status.attr("class", "mt-3 text-center small text-danger").text("❌ Erreur de connexion au Worker Cloudflare.");
        }
    });

    // 3. OCR
    $("#img-up").on("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;
        status.text("Analyse de l'image...");
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width * 2; canvas.height = img.height * 2;
                ctx.scale(2, 2);
                ctx.drawImage(img, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let grayscale = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
                    data[i] = data[i+1] = data[i+2] = (grayscale > 160) ? 255 : 0;
                }
                ctx.putImageData(imageData, 0, 0);
                Tesseract.recognize(canvas.toDataURL(), 'eng').then(({ data: { text } }) => {
                    const lines = text.split('\n');
                    let bestCandidate = "";
                    lines.forEach(line => {
                        let digitsOnly = line.replace(/\D/g, '');
                        if (digitsOnly.length >= 50) bestCandidate = digitsOnly;
                    });
                    if (bestCandidate.length >= 54) {
                        iidInput.val(bestCandidate.slice(-63)).trigger('input');
                        status.attr("class", "text-success fw-bold mt-2").text("✅ IID extrait ! Cliquez sur Obtenir CID.");
                    } else {
                        status.attr("class", "text-danger mt-2").text("❌ Image illisible.");
                    }
                });
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
});
</script>
</body>
</html>
