<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Activation Expert - GitHub Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { --primary: #0078d4; --bg: #f3f2f1; --dark-card: #1a1c1e; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card-expert { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; max-width: 650px; margin: auto; }
        .drop-zone { border: 2px dashed var(--primary); border-radius: 12px; padding: 40px; cursor: pointer; background: #f0f7ff; text-align: center; display: block; }
        .iid-input { font-size: 1.2rem; letter-spacing: 2px; font-weight: 700; text-align: center; }
        .info-panel { background: #e7f3ff; border-left: 5px solid var(--primary); padding: 15px; border-radius: 4px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-expert">
        <h3 class="text-center fw-bold text-primary mb-4">Support Activation GitHub</h3>
        
        <div class="mb-4">
            <label for="img-up" class="drop-zone">
                <span class="fs-5 d-block mb-2">📸 Charger l'image de l'étape 2</span>
                <input type="file" id="img-up" accept="image/*" style="display:none">
            </label>
            <div id="ocr-status" class="mt-3 text-center small text-secondary">En attente d'image...</div>
        </div>

        <hr class="my-4">

        <div class="mb-3">
            <label class="fw-bold small mb-1 text-uppercase text-muted">Installation ID (IID) extrait :</label>
            <div class="input-group mb-2">
                <input type="text" id="tbxIID" class="form-control iid-input" placeholder="000000-000000...">
                <button type="button" id="btnGoGitHub" class="btn btn-dark px-4 fw-bold">🚀 LANCER L'ENGINE</button>
            </div>
        </div>

        <div id="instructions" class="info-panel">
            <h6 class="fw-bold text-primary">👉 Prochaine étape :</h6>
            <ol class="small mb-0">
                <li>L'IID a été copié dans votre presse-papier.</li>
                <li>La page <strong>Actions</strong> de GitHub va s'ouvrir.</li>
                <li>Cliquez sur <strong>"Run workflow"</strong>, collez l'IID et validez.</li>
            </ol>
        </div>
    </div>
    
    <p class="text-center mt-4 text-muted small">© 2026 Ebooxly Tech - Moteur sécurisé sur GitHub Actions</p>
</div>

<script>
$(document).ready(function() {
    const iidInput = $("#tbxIID");
    const status = $("#ocr-status");

    // 1. FORMATAGE DYNAMIQUE IID
    iidInput.on("input", function() {
        let t = this.value.replace(/\D/g, "");
        if(t.length == 63 || t.length == 54) {
            this.value = t.match(new RegExp(".{1," + t.length/9 + "}", "g")).join("-");
        } else { this.value = t; }
    });

    // 2. APPEL À TON WORKER CLOUDFLARE
    $("#btnGetCID").on("click", async function() {
        const rawIID = iidInput.val().replace(/\D/g, "");
        if (rawIID.length < 54) {
            alert("IID invalide.");
            return;
        }

        status.attr("class", "mt-3 text-center small text-primary").html("<div class='loader'></div> Connexion au moteur Cloudflare...");

        try {
            const response = await fetch("https://ms-activation-api.hilalyweb.workers.dev/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ iid: rawIID })
            });

            const xmlText = await response.text();

            // Extraction du CID depuis la réponse XML de Microsoft
            const match = xmlText.match(/&lt;CID&gt;(\d+)&lt;\/CID&gt;/);

            if (match) {
                const cid = match[1];
                $("#tbxCid").val(cid);
                // Remplissage automatique des cases A-H
                for(let i=0; i<8; i++) {
                    let chunk = cid.substring(i*6, (i+1)*6);
                    $(`#cid${String.fromCharCode(65+i)}`).val(chunk);
                }
                status.attr("class", "mt-3 text-center small text-success fw-bold").text("✅ CID reçu avec succès !");
            } else {
                status.attr("class", "mt-3 text-center small text-danger").text("❌ Microsoft a refusé l'IID (Vérifiez la clé).");
            }
        } catch (err) {
            status.attr("class", "mt-3 text-center small text-danger").text("❌ Erreur de connexion au Worker.");
        }
    });

   
    // 3. OCR (Ta version optimisée qui marche bien)
    $("#img-up").on("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;
        status.text("Analyse en cours...");

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width * 2; canvas.height = img.height * 2;
                ctx.scale(2, 2);
                ctx.drawImage(img, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let grayscale = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
                    data[i] = data[i+1] = data[i+2] = (grayscale > 160) ? 255 : 0;
                }
                ctx.putImageData(imageData, 0, 0);

                Tesseract.recognize(canvas.toDataURL(), 'eng').then(({ data: { text } }) => {
                    const lines = text.split('\n');
                    let bestCandidate = "";
                    lines.forEach(line => {
                        let digitsOnly = line.replace(/\D/g, '');
                        if (digitsOnly.length >= 50) bestCandidate = digitsOnly;
                    });
                    if (bestCandidate.length >= 54) {
                        iidInput.val(bestCandidate.slice(-63)).trigger('input');
                        status.attr("class", "text-success fw-bold").text("✅ IID prêt ! Cliquez sur le bouton noir.");
                    } else {
                        status.attr("class", "text-danger").text("❌ Image illisible.");
                    }
                });
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
});
</script>
</body>
</html>
